# =============================================================================
# policies-app.yaml
# ArgoCD Application that watches the POLICY path (PolicyGenerator CRs).
# Equivalent of out/argocd/deployment/policies-app.yaml.
#
# Requires the PolicyGenerator kustomize plugin to be enabled on the
# openshift-gitops ArgoCD instance (done via the deployment patch you extract
# from the ztp-site-generate container -- see bootstrap/README notes).
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: policies
  namespace: openshift-gitops
spec:
  project: ztp
  source:
    repoURL: https://github.com/kcalliga/ztp-2026-example.git   # <-- your repo
    targetRevision: main
    path: site-policies              # policy path in THIS repo
    # The PolicyGenerator plugin runs kustomize with --enable-alpha-plugins.
    # The argocd instance patch wires this up cluster-wide; nothing needed here
    # beyond pointing at a path whose kustomization.yaml uses `generators:`.
  destination:
    server: https://kubernetes.default.svc
    namespace: policies
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
